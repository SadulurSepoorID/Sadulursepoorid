<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward Center | Executive Panel SSI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <div id="sidebar-overlay" class="overlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="mySidebar">
            <div class="sidebar-brand">
                <div class="brand-icon"><i class="fa-solid fa-crown"></i></div>
                <div class="brand-text">
                    <h3>Ketua Umum</h3>
                    <span>Executive Panel</span>
                </div>
            </div>
            
            <nav class="nav-menu">
                <a href="../dashboard/index.html" class="nav-link">
                    <i class="fa-solid fa-house-chimney"></i> <span>Dashboard</span>
                </a>
                <a href="#" class="nav-link active">
                    <i class="fa-solid fa-gift"></i> <span>Kelola Reward</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <p>© 2026 Sadulur Sepoor</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="navbar">
                <button id="hamburger-btn" class="icon-btn" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <div class="user-profile">
                    <span id="user-name">Memuat...</span>
                    <div class="avatar">F</div>
                </div>
            </header>

            <section class="container">
                <div class="page-header">
                    <div class="header-content">
                        <h1>Reward Center Setup</h1>
                        <p>Strategi gamifikasi & manajemen inventaris poin.</p>
                    </div>
                    <div class="tab-navigator">
                        <button class="tab-item active" onclick="switchTab(event, 'tab-config')">Poin Harian</button>
                        <button class="tab-item" onclick="switchTab(event, 'tab-catalog')">Katalog Hadiah</button>
                    </div>
                </div>

                <div id="tab-config" class="tab-pane active">
                    <div class="action-bar">
                        <div class="info-badge"><i class="fa-solid fa-calendar-check"></i> Periode 30 Hari Aktif</div>
                        <button class="btn btn-primary" id="btn-save-config" onclick="saveDailyConfig()">
                            <i class="fa-solid fa-cloud-arrow-up"></i> Sinkronisasi Data
                        </button>
                    </div>
                    <div id="config-wrapper" class="grid-config">
                        </div>
                </div>

                <div id="tab-catalog" class="tab-pane">
                    <div class="action-bar">
                        <p class="count-text">Kelola inventaris hadiah komunitas</p>
                        <button class="btn btn-primary" onclick="openAddModal()">
                            <i class="fa-solid fa-plus"></i> Item Baru
                        </button>
                    </div>
                    <div id="catalog-list" class="grid-catalog">
                        </div>
                </div>
            </section>
        </main>
    </div>

    <div id="item-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-item-title">Detail Item</h3>
                <button class="close-modal" onclick="closeItemModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="item-id">
                
                <div class="form-control">
                    <label>Jenis Hadiah</label>
                    <select id="item-jenis" onchange="toggleJenisLainnya()">
                        <option value="Voucher">Voucher / Diskon</option>
                        <option value="Saldo">Saldo (Kas/E-Wallet)</option>
                        <option value="Tiket">Tiket / Akses Eksklusif</option>
                        <option value="Lainnya">Lainnya...</option>
                    </select>
                    <input type="text" id="item-jenis-lain" placeholder="Ketik jenis hadiah di sini..." style="display: none; margin-top: 10px;">
                </div>

                <div class="form-control">
                    <label>Nama Hadiah</label>
                    <input type="text" id="item-nama" placeholder="Contoh: Gantungan Kunci Exclusive SSI">
                </div>
                
                <div class="form-control">
                    <label>Deskripsi / S&K Berlaku</label>
                    <textarea id="item-deskripsi" rows="3" placeholder="Contoh: Voucher diskon 50% max Rp10.000. Hanya berlaku untuk merchandise..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-control">
                        <label>Harga Poin</label>
                        <input type="number" id="item-harga" placeholder="0">
                    </div>
                    <div class="form-control">
                        <label>Stok Tersedia</label>
                        <input type="number" id="item-stok" placeholder="0">
                    </div>
                </div>
                <div class="form-control" style="margin-bottom: 24px;">
                    <label>Status Visibilitas</label>
                    <select id="item-status">
                        <option value="Aktif">Tampilkan di Dashboard Anggota</option>
                        <option value="Nonaktif">Sembunyikan Sementara</option>
                    </select>
                </div>
                <button class="btn btn-block btn-primary" onclick="saveCatalogItem()" id="btn-save-item">
                    Simpan Perubahan
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../config.js"></script>
    <script src="script.js"></script>
</body>
</html>
